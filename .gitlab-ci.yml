workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

setup:
  stage: .pre
  script:
    - java -version
    - mvn --version
    - echo CI_BUILDS_DIR = $CI_BUILDS_DIR
    - echo CI_PROJECT_DIR = $CI_PROJECT_DIR

build:
  stage: build
  artifacts:
    paths:
      - target
  script:
    - mvn -V --color always -ntp clean verify --file pom.xml '-Dgpg.skip' -Ppit

test:
  image: uhafner/autograding-gitlab-action:1.0.6-SNAPSHOT
  stage: test
  variables:
    CONFIG: >
      {
      "tests": {
        "tools": [
          {
            "id": "test",
            "name": "Unittests",
            "pattern": "**/target/*-reports/TEST*.xml"
          }
        ],
        "name": "Unit and integration tests",
        "skippedImpact": -1,
        "failureImpact": -5,
        "maxScore": 100
        }
      }
    SKIP_ANNOTATIONS: 'true'
  script:
    - java -cp @/app/jib-classpath-file edu.hm.hafner.grading.gitlab.GitLabAutoGradingRunner


