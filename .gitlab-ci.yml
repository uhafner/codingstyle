workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

setup:
  stage: .pre
  script:
    - java -version
    - mvn --version

build:
  stage: build
  artifacts:
    paths:
      - target
  script:
    - mvn -V --color always -ntp clean verify --file pom.xml '-Dgpg.skip'

test:
  image: uhafner/autograding-gitlab-action:1.0.5-SNAPSHOT
  stage: test
  script:
    - java -cp @/app/jib-classpath-file edu.hm.hafner.grading.gitlab.GitLabAutoGradingRunner


