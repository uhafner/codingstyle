workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

setup:
  stage: .pre
  script:
    - java -version
    - mvn --version
    - echo CI_BUILDS_DIR = $CI_BUILDS_DIR
    - echo CI_PROJECT_DIR = $CI_PROJECT_DIR

build:
  image:
    name: maven:3.9.6-eclipse-temurin-21-alpine
  stage: build
  artifacts:
    paths:
      - target
  script:
    - mvn -V --color always -ntp clean verify --file pogm.xml '-Dgpg.skip' -Ppit

test:
  image: uhafner/autograding-gitlab-action:1.6.0
  stage: test
  script:
    - java -cp @/app/jib-classpath-file edu.hm.hafner.grading.gitlab.GitLabAutoGradingRunner




